<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile — Cube MN</title>
  <style>
    :root {
      --bg: #080810; --surface: #0f0f1a; --card: #131325;
      --accent: #7c3aed; --accent2: #ec4899;
      --glow: rgba(124,58,237,0.35);
      --text: #e2e8f0; --muted: #64748b;
      --nav-bg: rgba(8,8,16,0.75);
      --text-primary: #ffffff; --text-secondary: #cbd5f5; --text-muted: #8b90b3;
      --input-bg: rgba(255,255,255,0.04); --input-border: rgba(255,255,255,0.08);
      --sidebar-bg: #0d0d1c; --option-bg: #1a1a30;
      --border: rgba(255,255,255,0.08); --bg-card: #131325;
    }
    html[data-theme="soft-light"] {
      --bg: #f5f6fa; --surface: #eaecf4; --card: #ffffff;
      --glow: rgba(124,58,237,0.1);
      --text: #1e1b4b; --muted: #6b7280;
      --nav-bg: rgba(245,246,250,0.92);
      --text-primary: #1c1d2a; --text-secondary: #4b5563; --text-muted: #9ca3af;
      --input-bg: rgba(0,0,0,0.04); --input-border: rgba(0,0,0,0.1);
      --sidebar-bg: #eaecf4; --bg-card: #ffffff;
    }
    html[data-theme="purple-light"] {
      --bg: #f0ebff; --surface: #e6dfff; --card: #faf8ff;
      --glow: rgba(124,58,237,0.15);
      --text: #2d1b69; --muted: #7c6fa0;
      --nav-bg: rgba(240,235,255,0.94);
      --text-primary: #2d1b69; --text-secondary: #5b4a9e; --text-muted: #7c6fa0;
      --input-bg: rgba(0,0,0,0.04); --input-border: rgba(0,0,0,0.1);
      --sidebar-bg: #e6dfff; --bg-card: #faf8ff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh; overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: var(--nav-bg);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(124,58,237,0.3);
      padding: 0 2rem; height: 58px;
      display: flex; align-items: center; justify-content: space-between;
    }
    html[data-theme="soft-light"] nav,
    html[data-theme="purple-light"] nav { border-bottom-color: rgba(124,58,237,0.2); }
    .nav-logo {
      font-size: 1.25rem; font-weight: 800; letter-spacing: 2px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .nav-right { display: flex; align-items: center; gap: 0.75rem; }
    .nav-username { font-size: 0.82rem; color: var(--muted); }
    .btn-homepage {
      padding: 0.38rem 0.85rem; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.06); color: var(--text);
      font-size: 0.78rem; font-weight: 600; text-decoration: none;
      transition: background 0.2s; white-space: nowrap;
      display: inline-flex; align-items: center; gap: 0.3rem;
    }
    .btn-homepage:hover { background: rgba(255,255,255,0.12); }
    html[data-theme="soft-light"] .btn-homepage,
    html[data-theme="purple-light"] .btn-homepage {
      border-color: rgba(0,0,0,0.15); background: rgba(0,0,0,0.04);
    }
    .btn-logout {
      padding: 0.38rem 0.85rem; border-radius: 8px;
      border: 1px solid rgba(244,63,94,0.35);
      background: rgba(244,63,94,0.1); color: #f87171;
      font-size: 0.78rem; font-weight: 600; cursor: pointer;
      transition: background 0.2s;
    }
    .btn-logout:hover { background: rgba(244,63,94,0.2); }
    .theme-btn {
      background: rgba(124,58,237,0.12); border: 1px solid rgba(124,58,237,0.3);
      color: #a78bfa; border-radius: 8px; padding: 0.35rem 0.65rem;
      font-size: 0.76rem; font-weight: 600; cursor: pointer; transition: background 0.2s;
    }
    .theme-btn:hover { background: rgba(124,58,237,0.22); }
    html[data-theme="soft-light"] .theme-btn,
    html[data-theme="purple-light"] .theme-btn { color: #7c3aed; }

    /* LANG SWITCHER */
    .lang-switcher {
      position: relative; display: inline-flex; align-items: center;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 999px; padding: 3px;
    }
    .lang-switcher::before {
      content: ''; position: absolute;
      left: 3px; top: 3px; bottom: 3px;
      width: calc(50% - 3px);
      background: linear-gradient(135deg, #7c3aed, #ec4899);
      border-radius: 999px;
      transition: transform 0.28s cubic-bezier(.4,0,.2,1);
      box-shadow: 0 0 10px rgba(124,58,237,0.4);
    }
    .lang-switcher:has(.lang-opt[data-lang="mn"].active)::before {
      transform: translateX(100%);
    }
    .lang-opt {
      position: relative; z-index: 1; flex: 1;
      background: transparent; border: none;
      color: var(--muted); border-radius: 999px;
      padding: 0.2rem 0.7rem;
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.05em;
      cursor: pointer; transition: color 0.2s; text-align: center; white-space: nowrap;
    }
    .lang-opt.active { color: #fff; }
    html[data-theme="soft-light"] .lang-switcher,
    html[data-theme="purple-light"] .lang-switcher {
      background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.1);
    }
    html[data-theme="soft-light"] .lang-opt.active,
    html[data-theme="purple-light"] .lang-opt.active { color: #fff; }

    /* MAIN */
    .main { max-width: 1200px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }

    /* LOADING / ERROR */
    .state-msg {
      text-align: center; padding: 5rem 2rem;
      font-size: 1rem; color: var(--muted);
    }
    .state-msg.error { color: #f87171; }

    /* PROFILE HEADER */
    .profile-header {
      display: flex; align-items: center; gap: 1.6rem;
      margin-bottom: 2rem; flex-wrap: wrap;
    }
    .avatar {
      width: 88px; height: 88px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; font-weight: 800; color: #fff;
      overflow: hidden;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .profile-info { flex: 1; min-width: 0; }
    .profile-name {
      font-size: 1.7rem; font-weight: 800; color: var(--text-primary);
      line-height: 1.15; word-break: break-word;
    }
    .profile-meta { display: flex; gap: 1.2rem; flex-wrap: wrap; margin-top: 0.5rem; }
    .profile-meta-item { font-size: 0.82rem; color: var(--muted); }
    .profile-meta-item b { color: #a78bfa; font-weight: 600; font-family: monospace; }

    /* STATS BAR */
    .stats-bar {
      display: flex; gap: 0; border-radius: 14px; overflow: hidden;
      background: var(--surface); border: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 2rem;
    }
    html[data-theme="soft-light"] .stats-bar,
    html[data-theme="purple-light"] .stats-bar { border-color: rgba(0,0,0,0.08); }
    .stat-item {
      flex: 1; text-align: center; padding: 1.2rem 1rem;
      border-right: 1px solid rgba(255,255,255,0.06);
    }
    html[data-theme="soft-light"] .stat-item,
    html[data-theme="purple-light"] .stat-item { border-right-color: rgba(0,0,0,0.08); }
    .stat-item:last-child { border-right: none; }
    .stat-val {
      font-size: 1.8rem; font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .stat-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 0.15rem; }

    /* SECTION */
    .section-title {
      font-size: 1rem; font-weight: 700; color: var(--text-primary);
      text-transform: uppercase; letter-spacing: 0.1em;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid rgba(124,58,237,0.2);
      display: flex; align-items: center; gap: 0.5rem;
    }
    .section-title::before { content: ''; display: inline-block; width: 3px; height: 1em; background: linear-gradient(180deg,var(--accent),var(--accent2)); border-radius: 2px; }

    /* TABLES */
    .table-wrap { overflow-x: auto; margin-bottom: 2rem; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      text-align: left; padding: 0.65rem 0.9rem;
      font-size: 0.71rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--muted);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      white-space: nowrap;
    }
    html[data-theme="soft-light"] thead th,
    html[data-theme="purple-light"] thead th { border-bottom-color: rgba(0,0,0,0.1); }
    tbody td {
      padding: 0.7rem 0.9rem; font-size: 0.88rem;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    html[data-theme="soft-light"] tbody td,
    html[data-theme="purple-light"] tbody td { border-bottom-color: rgba(0,0,0,0.06); }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: rgba(124,58,237,0.05); }
    .time-val { font-family: monospace; font-weight: 600; }
    .time-dnf { font-family: monospace; color: #f87171; }
    .muted { color: var(--muted); font-size: 0.8rem; }

    /* COMP HISTORY BLOCK */
    .comp-block { margin-bottom: 2rem; }
    .comp-block-title {
      font-size: 0.88rem; font-weight: 700; color: #c4b5fd;
      margin-bottom: 0.6rem;
    }

    /* EMPTY */
    .empty {
      text-align: center; padding: 3rem 2rem;
      color: var(--muted); font-size: 0.9rem;
    }
    .empty-icon { font-size: 2rem; margin-bottom: 0.6rem; }

    /* CARD */
    .card {
      background: var(--card); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px; padding: 1.5rem; margin-bottom: 1.5rem;
    }
    html[data-theme="soft-light"] .card,
    html[data-theme="purple-light"] .card { border-color: rgba(0,0,0,0.08); box-shadow: 0 2px 12px rgba(0,0,0,0.05); }

    /* ================================================================
       RESULTS ENTRY STYLES
       ================================================================ */

    /* TABS */
    .tab-nav {
      display: flex; gap: 0.2rem;
      background: var(--card); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px; padding: 0.25rem; margin-bottom: 1.4rem;
      flex-wrap: wrap; position: relative; z-index: 10;
    }
    html[data-theme="soft-light"] .tab-nav,
    html[data-theme="purple-light"] .tab-nav { border-color: rgba(0,0,0,0.08); }
    .tab-btn {
      padding: 0.42rem 0.9rem; border: none; border-radius: 7px;
      background: transparent; color: var(--muted);
      font-size: 0.82rem; font-weight: 500; cursor: pointer;
      transition: all 0.2s; white-space: nowrap; font-family: inherit;
    }
    .tab-btn:hover { color: var(--text); background: rgba(255,255,255,0.04); }
    .tab-btn.active {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; font-weight: 600;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* CARD TITLE */
    .card-title {
      font-size: 1rem; font-weight: 700; color: var(--text);
      margin-bottom: 1.2rem; display: flex; align-items: center; gap: 0.5rem;
    }
    .card-title .title-accent {
      display: inline-block; width: 3px; height: 1em;
      background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 2px;
    }

    /* FORM */
    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block; font-size: 0.8rem; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 0.4rem;
    }
    .form-group select {
      width: 100%; padding: 0.7rem 0.9rem;
      background: var(--bg-card, #1a1a2e); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px; color: var(--text, #ffffff); font-size: 0.95rem;
      outline: none; transition: border-color 0.2s; font-family: inherit;
    }
    .form-group select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,58,237,0.15); }
    .form-group select option { background: var(--bg-card, #1a1a2e); color: var(--text, #ffffff); }

    /* MESSAGES */
    .msg {
      padding: 0.6rem 1rem; border-radius: 7px; font-size: 0.88rem;
      margin-top: 0.8rem; display: none;
    }
    .msg.success { background: rgba(34,197,94,0.12); border: 1px solid rgba(34,197,94,0.25); color: #4ade80; }
    .msg.error   { background: rgba(244,63,94,0.12);  border: 1px solid rgba(244,63,94,0.25);  color: #f43f5e; }
    .msg.warn    { background: rgba(251,191,36,0.12); border: 1px solid rgba(251,191,36,0.3);  color: #fbbf24; }

    @keyframes panelToastFade { 0%, 55% { opacity: 1; } 100% { opacity: 0; } }
    .panel-toast {
      font-size: 0.75rem; font-weight: 600; letter-spacing: 0.02em;
      text-align: center; padding: 0.25rem 0.5rem; border-radius: 6px;
      margin-top: 0.4rem; border: none; background: transparent;
      animation: panelToastFade 2s ease forwards;
    }
    .panel-toast.success { color: #4ade80; }
    .panel-toast.error   { color: #f87171; animation-duration: 3.5s; }

    /* BUTTONS */
    .btn-sm-primary {
      padding: 0.45rem 1rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 7px; color: #fff;
      font-size: 0.85rem; font-weight: 600; cursor: pointer;
      transition: opacity 0.2s; font-family: inherit;
    }
    .btn-sm-primary:hover { opacity: 0.85; }
    .btn-sm-primary:disabled { opacity: 0.4; cursor: default; }
    .btn-xs {
      font-size: 0.66rem; padding: 0.18rem 0.45rem; border-radius: 4px;
      cursor: pointer; font-family: inherit; line-height: 1.4;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04); color: var(--muted);
      transition: background 0.15s, color 0.15s;
    }
    .btn-xs:hover { background: rgba(255,255,255,0.1); color: var(--text); }
    .btn-xs:disabled { opacity: 0.4; cursor: default; }

    /* SOLVE INPUTS */
    .solve-group { display: flex; flex-direction: column; align-items: center; gap: 0.3rem; }
    .solve-label { font-size: 0.7rem; color: var(--muted); font-weight: 600; letter-spacing: 0.05em; }
    .solve-input {
      width: 80px; padding: 0.7rem 0.4rem; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.04);
      color: #fff; font-family: monospace; font-size: 1rem;
      text-align: center; outline: none; transition: border-color 0.2s;
    }
    html[data-theme="soft-light"] .solve-input,
    html[data-theme="purple-light"] .solve-input { color: var(--text); }
    .solve-input:focus { border-color: var(--accent); }
    .solve-input.dnf-val { color: #f43f5e; }
    .solve-btns { display: flex; gap: 0.2rem; margin-top: 0.15rem; }
    .solve-btn {
      flex: 1; font-size: 0.62rem; font-weight: 700; padding: 0.18rem 0.25rem;
      border-radius: 4px; cursor: pointer; font-family: inherit; line-height: 1;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .solve-btn-plus2 { border: 1px solid rgba(234,179,8,0.3); background: rgba(234,179,8,0.06); color: #d97706; }
    .solve-btn-plus2:hover, .solve-btn-plus2.active { background: rgba(234,179,8,0.22); border-color: rgba(234,179,8,0.7); color: #fbbf24; }
    .solve-btn-dnf   { border: 1px solid rgba(244,63,94,0.3);  background: rgba(244,63,94,0.06);  color: #f87171; }
    .solve-btn-dnf:hover, .solve-btn-dnf.active { background: rgba(244,63,94,0.22); border-color: rgba(244,63,94,0.7); color: #f43f5e; }

    /* CALC ROW */
    .calc-row { display: flex; gap: 1rem; margin-bottom: 0.9rem; }
    .calc-item { flex: 1; text-align: center; }
    .calc-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 0.2rem; }
    .calc-value { font-size: 1.1rem; font-weight: 700; font-family: monospace; color: var(--text); }
    .calc-value.accent { color: #a78bfa; }
    .calc-value.dnf    { color: #f43f5e; }

    /* COMPACT MULTI-PANEL GRID */
    .multi-entry-grid { display: grid; grid-template-columns: 1fr; gap: 0.75rem; margin-top: 1rem; }
    @media (max-width: 640px) { .multi-entry-grid { grid-template-columns: 1fr !important; } }
    .compact-panel {
      background: var(--card); border: 1px solid rgba(124,58,237,0.2);
      border-radius: 12px; padding: 0.85rem 0.9rem 0.75rem;
    }
    .compact-panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.55rem; }
    .compact-panel-title { font-size: 0.72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .compact-panel-actions { display: flex; gap: 0.25rem; }
    .compact-select {
      width: 100%; margin-bottom: 0.3rem;
      padding: 0.32rem 0.5rem;
      background: var(--bg-card, #1a1a2e); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 7px; color: var(--text, #ffffff); font-size: 0.78rem; outline: none;
      transition: border-color 0.2s; font-family: inherit;
    }
    .compact-select option { background: var(--bg-card, #1a1a2e); color: var(--text, #ffffff); }
    .compact-select:focus { border-color: var(--accent); }
    .compact-select:disabled { opacity: 0.4; }
    .compact-rg-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.3rem; margin-bottom: 0.3rem; }
    .compact-solves-row { display: flex; gap: 0.22rem; flex-wrap: nowrap; justify-content: space-between; margin-bottom: 0.55rem; }
    .compact-solves-row .solve-group { flex: 1; min-width: 0; }
    .compact-solves-row .solve-input { width: 100%; padding: 0.5rem 0.15rem; font-size: 0.82rem; }
    .compact-solves-row .solve-btn { font-size: 0.58rem; padding: 0.15rem 0.1rem; }
    .compact-calc-row {
      display: flex; gap: 0.5rem; margin-bottom: 0.5rem;
      background: rgba(124,58,237,0.06); border-radius: 7px; padding: 0.35rem 0.5rem;
    }
    .compact-calc-row .calc-item { flex: 1; text-align: center; }
    .compact-calc-row .calc-label { font-size: 0.62rem; margin-bottom: 0.1rem; }
    .compact-calc-row .calc-value { font-size: 0.95rem; }

    /* INSPECTION TIMER */
    .insp-toggle-btn {
      font-size: 0.73rem; font-weight: 600; padding: 0.22rem 0.65rem; border-radius: 6px;
      background: transparent; border: 1px solid rgba(255,255,255,0.12);
      color: var(--muted); cursor: pointer; font-family: inherit;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .insp-toggle-btn:hover { background: rgba(255,255,255,0.06); color: var(--text); }
    .insp-toggle-btn.active { background: rgba(124,58,237,0.12); border-color: rgba(124,58,237,0.35); color: #a78bfa; }
    .insp-box {
      display: none; border: 1px solid rgba(255,255,255,0.08); border-radius: 10px;
      background: rgba(255,255,255,0.025); padding: 0.8rem 1rem 0.7rem;
      margin-top: 0.55rem; margin-bottom: 0.7rem;
    }
    .insp-box.visible { display: block; }
    .insp-time-row { display: flex; align-items: baseline; gap: 0.55rem; margin-bottom: 0.45rem; }
    .insp-time { font-family: monospace; font-size: 2.4rem; font-weight: 700; letter-spacing: 0.02em; color: var(--text); line-height: 1; min-width: 5ch; }
    .insp-status { font-size: 0.8rem; font-weight: 700; letter-spacing: 0.06em; padding: 0.18rem 0.5rem; border-radius: 5px; border: 1px solid transparent; display: none; }
    .insp-status.visible { display: inline-block; }
    .insp-status.warn  { background: rgba(251,191,36,0.12); border-color: rgba(251,191,36,0.3); color: #fbbf24; }
    .insp-status.warn2 { background: rgba(249,115,22,0.12); border-color: rgba(249,115,22,0.3); color: #fb923c; }
    .insp-status.plus2 { background: rgba(251,191,36,0.15); border-color: rgba(251,191,36,0.4); color: #fde68a; }
    .insp-status.dnf   { background: rgba(244,63,94,0.15);  border-color: rgba(244,63,94,0.4);  color: #f43f5e; }
    .insp-time.state-warn  { color: #fbbf24; }
    .insp-time.state-warn2 { color: #fb923c; }
    .insp-time.state-plus2 { color: #fde68a; }
    .insp-time.state-dnf   { color: #f43f5e; }
    .insp-btns { display: flex; gap: 0.35rem; flex-wrap: wrap; }
    .insp-btn {
      font-size: 0.76rem; font-weight: 600; padding: 0.32rem 0.85rem; border-radius: 6px;
      cursor: pointer; font-family: inherit; transition: background 0.13s, border-color 0.13s;

// ================================================================
// UTILITIES
// ================================================================
function escHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function fmtTime(cs) {
  if (cs === -1) return 'DNF';
  if (cs === -2) return 'DNS';
  if (cs === null || cs === undefined || cs === '') return '—';
  cs = Number(cs);
  if (cs >= 6000) {
    const m = Math.floor(cs / 6000);
    const s = Math.floor((cs % 6000) / 100);
    const c = cs % 100;
    return `${m}:${String(s).padStart(2,'0')}.${String(c).padStart(2,'0')}`;
  }
  return `${Math.floor(cs/100)}.${String(cs%100).padStart(2,'0')}`;
}

function parseTime(str) {
  str = str.trim().toUpperCase().replace(/\s*(PR|TR|NR|CR|WR)$/, '');
  if (str === 'DNF') return -1;
  if (str === 'DNS') return -2;
  if (!str) return null;
  let plus2 = false;
  if (str.endsWith('+')) { plus2 = true; str = str.slice(0, -1); }
  const colonIdx = str.indexOf(':');
  let cs;
  if (colonIdx !== -1) {
    const m = parseInt(str.slice(0, colonIdx));
    const rest = parseFloat(str.slice(colonIdx + 1));
    cs = Math.round(m * 6000 + rest * 100);
  } else {
    cs = Math.round(parseFloat(str) * 100);
  }
  if (isNaN(cs)) return null;
  return plus2 ? cs + 200 : cs;
}

function rawDigitsToTimeStr(digits) {
  const cc   = digits.slice(-2).padStart(2, '0');
  const rest = digits.length > 2 ? digits.slice(0, -2) : '';
  const ss   = rest.slice(-2);
  const mm   = rest.length > 2 ? rest.slice(0, -2) : '';
  const sNum = ss ? parseInt(ss, 10) : 0;
  if (mm) return parseInt(mm, 10) + ':' + String(sNum).padStart(2, '0') + '.' + cc;
  return sNum + '.' + cc;
}

function formatSolveInput(inp) {
  const raw = inp.value.trim();
  if (!raw) return;
  const upper = raw.toUpperCase();
  if (upper === 'DNF' || upper === 'DNS') return;
  const hasPlus = raw.endsWith('+');
  const core = hasPlus ? raw.slice(0, -1).trim() : raw;
  if (/^\d+$/.test(core)) inp.value = rawDigitsToTimeStr(core) + (hasPlus ? '+' : '');
}

function calcAo5(solves) {
  const vals = solves.map(s => (s === null || s === undefined || s === '') ? null : Number(s)).filter(s => s !== null);
  if (vals.length < 5) return null;
  const dnfCount = vals.filter(v => v < 0).length;
  if (dnfCount >= 2) return -1;
  const sorted = [...vals].sort((a, b) => {
    if (a < 0 && b < 0) return 0;
    if (a < 0) return 1; if (b < 0) return -1;
    return a - b;
  });
  const middle = sorted.slice(1, 4);
  if (middle.some(v => v < 0)) return -1;
  return Math.round(middle.reduce((acc, v) => acc + v, 0) / 3);
}

function bestSingle(solves) {
  const valid = solves.filter(v => v !== null && v !== undefined && v !== '' && Number(v) > 0);
  if (!valid.length) return -1;
  return Math.min(...valid.map(Number));
}

function getRoundNames(n) {
  if (n <= 1) return ['Final'];
  if (n === 2) return ['First Round', 'Final'];
  if (n === 3) return ['First Round', 'Second Round', 'Final'];
  if (n === 4) return ['First Round', 'Second Round', 'Semi Final', 'Final'];
  const names = [];
  for (let i = 0; i < n - 2; i++) names.push(['First Round','Second Round','Third Round'][i] || `Round ${i+1}`);
  names.push('Semi Final'); names.push('Final');
  return names;
}

function showPanelToast(el, type, text) {
  el.style.animation = 'none';
  el.offsetHeight;
  el.className     = `msg panel-toast ${type}`;
  el.textContent   = text;
  el.style.display = 'block';
  el.style.animation = '';
  const dur = type === 'success' ? 2000 : 3500;
  clearTimeout(el._toastTimer);
  el._toastTimer = setTimeout(() => { el.style.display = 'none'; }, dur);
}

function showMsg(el, type, text) {
  el.className     = `msg ${type}`;
  el.textContent   = text;
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 5000);
}

try { session = JSON.parse(localStorage.getItem('cubeAthleteUser') || 'null'); } catch(e) { session = null; }

// Allow results_entry users who may not have an athleteId
if (!session || (!session.athleteId && session.role !== 'results_entry')) {

// CACHES (used by Results Entry functions)
// ================================================================
var athletesCache      = [];
var competitionsCache  = [];

// Results Entry state
var numPanels          = 1;
var panelState         = [{ selectedAthlete: null }];
var allAdminResults    = [];
var unsubCompResults   = null;
var crCompId = null, crEvId = null, crRound = 1, crGroup = null;

document.addEventListener('DOMContentLoaded', function() {

async function showResultsEntryView() {
  document.getElementById('pageContent').style.display = 'none';
  document.getElementById('resultsEntryDash').style.display = 'block';

  try {
    // Load athletes
    const athSnap = await window.db.collection('athletes').get();
    athletesCache = athSnap.docs.map(function(d) { return Object.assign({ id: d.id }, d.data()); });

    // Live listener for competitions
    window.db.collection('competitions').onSnapshot(function(snap) {
      competitionsCache = snap.docs.map(function(d) { return Object.assign({ id: d.id }, d.data()); });
      refreshResultsCompDropdown();
    }, function(err) { console.error('competitions listener:', err.message); });

    // Build initial panels
    buildResultPanels();

    // Wire up competition selector for Results Entry
    document.getElementById('resComp').addEventListener('change', function() {
      updateAllPanelAthletes();
      updateEntryPanelVisibility();
    });

    // Wire up competition selector for Competition Results tab
    document.getElementById('crCompSel').addEventListener('change', function() {
      crSelectComp(this.value);
    });

    // Start results feed (needed for eligibility checks)
    startCompResultsFeed();

  } catch(e) {
    document.getElementById('resultsEntryDash').innerHTML =
      '<div class="state-msg error">Failed to load: ' + escHtml(e.message) + '</div>';
  }
}

// ================================================================
// RESULTS ENTRY — PANEL FUNCTIONS
// ================================================================
function buildResultPanels() {
  const container = document.getElementById('resultPanels');
  if (!container) return;
  container.innerHTML = '';
  for (let i = 0; i < numPanels; i++) {
    const panel = document.createElement('div');
    panel.className = 'compact-panel';
    panel.innerHTML = `
      <div class="compact-panel-header">
        <span class="compact-panel-title">Panel ${i + 1}</span>
        <div class="compact-panel-actions">
          ${i > 0 ? `<button type="button" class="btn-xs" id="copyBtn${i}" title="Copy from panel above">Copy ↑</button>` : ''}
          <button type="button" class="btn-xs" id="clearBtn${i}">Clear</button>
        </div>
      </div>
      <select id="p${i}_athlete" class="compact-select"><option value="">— Тамирчид —</option></select>
      <select id="p${i}_event" class="compact-select" disabled><option value="">— Төрөл —</option></select>
      <div class="compact-rg-row">
        <select id="p${i}_round" class="compact-select" style="margin-bottom:0;"></select>
        <select id="p${i}_group" class="compact-select" style="margin-bottom:0;"></select>
      </div>
      <div class="compact-solves-row">
        ${[1,2,3,4,5].map(n => `
          <div class="solve-group">
            <span class="solve-label">S${n}</span>
            <input type="text" class="solve-input" id="solve${i}_${n}" placeholder="—" autocomplete="off" inputmode="decimal" pattern="[0-9]*[.,]?[0-9]*" />
            <div class="solve-btns">
              <button class="solve-btn solve-btn-plus2" id="plus2_${i}_${n}" type="button">+2</button>
              <button class="solve-btn solve-btn-dnf"   id="dnf_${i}_${n}"   type="button">DNF</button>
            </div>
          </div>`).join('')}
      </div>
      <div class="compact-calc-row">
        <div class="calc-item"><div class="calc-label">Single</div><div class="calc-value" id="calcSingle${i}">—</div></div>
        <div class="calc-item"><div class="calc-label">Average</div><div class="calc-value accent" id="calcAvg${i}">—</div></div>
      </div>
      <button class="btn-sm-primary" style="width:100%;padding:0.4rem;" id="saveResBtn${i}" disabled>Save</button>
      <div class="msg" id="resPanelMsg${i}"></div>
    `;
    container.appendChild(panel);

    panel.querySelector(`#p${i}_athlete`).addEventListener('change', () => { updatePanelEvents(i); checkPanelEligibility(i); });
    panel.querySelector(`#p${i}_event`).addEventListener('change',   () => updatePanelRoundGroup(i));
    panel.querySelector(`#p${i}_round`).addEventListener('change',   () => refreshPanelAthletesByEligibility(i));

    for (let n = 1; n <= 5; n++) {
      panel.querySelector(`#solve${i}_${n}`).addEventListener('input', function() {
        const v = this.value.trim().toUpperCase();
        this.classList.toggle('dnf-val', v === 'DNF' || v === 'DNS');
        document.getElementById(`plus2_${i}_${n}`).classList.toggle('active', v.endsWith('+'));
        document.getElementById(`dnf_${i}_${n}`).classList.toggle('active', v === 'DNF');
        updateCalc(i);
      });
      panel.querySelector(`#solve${i}_${n}`).addEventListener('blur', function() {
        formatSolveInput(this);
        const v = this.value.trim().toUpperCase();
        this.classList.toggle('dnf-val', v === 'DNF' || v === 'DNS');
        updateCalc(i);
      });
      panel.querySelector(`#plus2_${i}_${n}`).addEventListener('click', () => togglePlus2(i, n));
      panel.querySelector(`#dnf_${i}_${n}`).addEventListener('click',   () => toggleDnf(i, n));
      panel.querySelector(`#solve${i}_${n}`).addEventListener('keydown', function(e) {
        if (e.key !== 'Enter') return;
        e.preventDefault();
        formatSolveInput(this);
        const v = this.value.trim().toUpperCase();
        this.classList.toggle('dnf-val', v === 'DNF' || v === 'DNS');
        updateCalc(i);
        const next = panel.querySelector(`#solve${i}_${n + 1}`);
        if (next) { next.focus(); next.select(); }
      });
    }
    panel.querySelector(`#saveResBtn${i}`).addEventListener('click', () => saveResult(i));
    panel.querySelector(`#clearBtn${i}`).addEventListener('click',   () => clearPanelFull(i));
    if (i > 0) panel.querySelector(`#copyBtn${i}`).addEventListener('click', () => copyPanelFrom(i));
  }
}

function togglePlus2(idx, n) {
  const inp = document.getElementById(`solve${idx}_${n}`);
  const btn = document.getElementById(`plus2_${idx}_${n}`);
  const v   = inp.value.trim();
  if (!v || v.toUpperCase() === 'DNF' || v.toUpperCase() === 'DNS') return;
  if (v.endsWith('+')) { inp.value = v.slice(0, -1); btn.classList.remove('active'); }
  else { inp.value = v + '+'; btn.classList.add('active'); }
  inp.classList.remove('dnf-val');
  updateCalc(idx);
}

function toggleDnf(idx, n) {
  const inp = document.getElementById(`solve${idx}_${n}`);
  const btnDnf  = document.getElementById(`dnf_${idx}_${n}`);
  const btnPlus = document.getElementById(`plus2_${idx}_${n}`);
  if (inp.value.trim().toUpperCase() === 'DNF') {
    inp.value = ''; btnDnf.classList.remove('active'); inp.classList.remove('dnf-val');
  } else {
    inp.value = 'DNF'; btnDnf.classList.add('active'); btnPlus.classList.remove('active'); inp.classList.add('dnf-val');
  }
  updateCalc(idx);
}

function clearPanel(idx) {
  if (!panelState[idx]) return;
  panelState[idx].selectedAthlete = null;
  for (let n = 1; n <= 5; n++) {
    const inp = document.getElementById(`solve${idx}_${n}`);
    if (!inp) continue;
    inp.value = ''; inp.classList.remove('dnf-val');
    document.getElementById(`plus2_${idx}_${n}`).classList.remove('active');
    document.getElementById(`dnf_${idx}_${n}`).classList.remove('active');
  }
  const sEl = document.getElementById(`calcSingle${idx}`);
  const aEl = document.getElementById(`calcAvg${idx}`);
  if (sEl) { sEl.textContent = '—'; sEl.className = 'calc-value'; }
  if (aEl) { aEl.textContent = '—'; aEl.className = 'calc-value accent'; }
  const msgEl = document.getElementById(`resPanelMsg${idx}`);
  if (msgEl) msgEl.style.display = 'none';
}

function clearPanelFull(idx) {
  const athlSel = document.getElementById(`p${idx}_athlete`);
  const evSel   = document.getElementById(`p${idx}_event`);
  if (athlSel) athlSel.value = '';
  if (evSel)   { evSel.innerHTML = '<option value="">— Төрөл —</option>'; evSel.disabled = true; }
  updatePanelRoundGroup(idx);
  clearPanel(idx);
  syncSaveBtn(idx);
}

function getSolves(idx) {
  const solves = [];
  for (let n = 1; n <= 5; n++) {
    const v = document.getElementById(`solve${idx}_${n}`).value.trim();
    solves.push(v ? parseTime(v) : null);
  }
  return solves;
}

function updateCalc(idx) {
  const solves = getSolves(idx);
  const valid  = solves.filter(v => v !== null);
  const single = bestSingle(valid);
  const avg    = calcAo5(valid);
  const sEl    = document.getElementById(`calcSingle${idx}`);
  const aEl    = document.getElementById(`calcAvg${idx}`);
  sEl.textContent = (single !== undefined && single !== null) ? fmtTime(single) : '—';
  sEl.className   = 'calc-value';
  if (avg === null) { aEl.textContent = '—'; aEl.className = 'calc-value accent'; }
  else if (avg === -1) { aEl.textContent = 'DNF'; aEl.className = 'calc-value dnf'; }
  else { aEl.textContent = fmtTime(avg); aEl.className = 'calc-value accent'; }
  syncSaveBtn(idx);
}

function allSolvesFilled(idx) {
  for (let n = 1; n <= 5; n++) {
    const inp = document.getElementById(`solve${idx}_${n}`);
    if (!inp || inp.value.trim() === '') return false;
  }
  return true;
}

function syncSaveBtn(idx) {
  const saveBtn = document.getElementById(`saveResBtn${idx}`);
  if (!saveBtn) return;
  const msgEl = document.getElementById(`resPanelMsg${idx}`);
  const ineligible = msgEl && msgEl.classList.contains('warn') && msgEl.style.display !== 'none';
  saveBtn.disabled = ineligible || !allSolvesFilled(idx);
}

async function saveResult(idx) {
  const msg       = document.getElementById(`resPanelMsg${idx}`);
  const compId    = document.getElementById('resComp').value;
  const athlDocId = document.getElementById(`p${idx}_athlete`).value;
  const eventId   = document.getElementById(`p${idx}_event`).value;
  const round     = parseInt(document.getElementById(`p${idx}_round`).value) || 1;
  const group     = document.getElementById(`p${idx}_group`).value;
  const athl      = athlDocId ? athletesCache.find(a => a.id === athlDocId) : null;

  if (!athl)    { showMsg(msg, 'error', 'Select an athlete first.'); return; }
  if (!compId)  { showMsg(msg, 'error', 'Select a competition.'); return; }
  if (!eventId) { showMsg(msg, 'error', 'Select an event.'); return; }

  if (round > 1) {
    const _elig = athleteEligibilityStatus(compId, athl.id, eventId, round);
    if (_elig !== 'ok') {
      const compObj = competitionsCache.find(c => c.id === compId);
      const evData2 = compObj && compObj.events && compObj.events[eventId];
      const totalRnds = evData2 ? (parseInt(evData2.rounds) || 1) : round;
      const rNames = getRoundNames(totalRnds);
      const roundName = rNames[round - 1] || `Round ${round}`;
      const prevName  = rNames[round - 2] || `Round ${round - 1}`;
      showMsg(msg, 'error', _elig === 'not_qualified'
        ? `${athl.name} did not qualify from ${prevName} and cannot enter ${roundName}.`
        : `${athl.name} cannot enter ${roundName} — ${prevName} result is missing.`);
      return;
    }
  }

  const solves = getSolves(idx);
  if (solves.every(v => v === null)) { showMsg(msg, 'error', 'Enter at least one solve.'); return; }

  const comp = competitionsCache.find(c => c.id === compId);
  const evDef = WCA_EVENTS.find(e => e.id === eventId);
  const valid  = solves.filter(v => v !== null);
  const single  = bestSingle(valid);
  const average = calcAo5(valid);

  try {
    const existSnap = await window.db.collection('results').where('competitionId', '==', compId).get();
    const dup = existSnap.docs.find(d => {
      const r = d.data();
      return r.athleteId === athl.id && r.eventId === eventId && r.round === round;
    });
    if (dup) { showMsg(msg, 'error', `${athl.name} already has a result in this round.`); return; }
  } catch(_) {}

  try {
    await window.db.collection('results').add({
      competitionId:   compId,
      competitionName: comp ? comp.name : '',
      athleteId:       athl.id,
      athleteName:     athl.name,
      eventId, eventName: evDef ? evDef.name : eventId,
      round, group, solves,
      single:  single  !== undefined ? single  : null,
      average: average !== undefined ? average : null,
      dnf: valid.some(v => v === -1),
      dns: valid.some(v => v === -2),
      status: 'draft', source: 'club',
      submittedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    showPanelToast(msg, 'success', typeof t === 'function' ? t('result.saved') : 'Saved!');
    clearPanel(idx);
  } catch(e) {
    showPanelToast(msg, 'error', 'Save failed: ' + e.message);
  }
}

function updatePanelAthletes(idx) {
  const compId = document.getElementById('resComp').value;

  const prev = sel.value;

}

function updatePanelEvents(idx) {
  const compId    = document.getElementById('resComp').value;
  const athlDocId = document.getElementById(`p${idx}_athlete`).value;
  const sel       = document.getElementById(`p${idx}_event`);

function updatePanelRoundGroup(idx) {
  const compId  = document.getElementById('resComp').value;
  const eventId = document.getElementById(`p${idx}_event`).value;
  const roundSel = document.getElementById(`p${idx}_round`);
  const groupSel = document.getElementById(`p${idx}_group`);
  if (!roundSel || !groupSel) return;
  roundSel.innerHTML = '';
  groupSel.innerHTML = '';
  const comp   = competitionsCache.find(c => c.id === compId);
  const evData = comp && comp.events && eventId ? comp.events[eventId] : null;
  const rounds = evData ? (parseInt(evData.rounds) || 1) : 1;
  const rNames = getRoundNames(rounds);
  for (let r = 1; r <= rounds; r++) {
    const opt = document.createElement('option');
    opt.value = r; opt.textContent = rNames[r - 1] || `Round ${r}`;
    roundSel.appendChild(opt);
  }
  const rawGroups = evData ? (evData.groups || '') : '';
  let groups;
  if (Array.isArray(rawGroups)) {
    groups = rawGroups.length ? rawGroups : ['A'];
  } else {
    const str = rawGroups.trim().toUpperCase();
    if (str.length === 1 && str >= 'A' && str <= 'Z') {
      groups = [];
      for (let c = 'A'.charCodeAt(0); c <= str.charCodeAt(0); c++) groups.push(String.fromCharCode(c));
    } else {
      groups = str ? str.split(/\s+/) : ['A'];
    }
  }
  groups.forEach(g => {
    const opt = document.createElement('option');
    opt.value = g; opt.textContent = `Group ${g}`;
    groupSel.appendChild(opt);
  });
  refreshPanelAthletesByEligibility(idx);
}

function athleteEligibilityStatus(compId, athlId, eventId, targetRound) {
  if (targetRound <= 1) return 'ok';
  const hasResult = allAdminResults.some(r =>
    r.competitionId === compId && r.athleteId === athlId &&
    r.eventId === eventId && (r.round || 1) === targetRound - 1
  );
  if (!hasResult) return 'no_result';
  const comp = competitionsCache.find(c => c.id === compId);
  const qualSet = computeQualifiedSet(compId, eventId, targetRound - 1, allAdminResults, comp);
  if (!qualSet) return 'ok';
  return qualSet.ids.has(athlId) ? 'ok' : 'not_qualified';
}

function athleteEligibleForRound(compId, athlId, eventId, targetRound) {
  return athleteEligibilityStatus(compId, athlId, eventId, targetRound) === 'ok';
}

function checkPanelEligibility(idx) {
  const compId    = document.getElementById('resComp').value;
  const athlDocId = document.getElementById(`p${idx}_athlete`).value;
  const eventId   = document.getElementById(`p${idx}_event`).value;
  const round     = parseInt(document.getElementById(`p${idx}_round`).value) || 1;
  const saveBtn   = document.getElementById(`saveResBtn${idx}`);
  const msgEl     = document.getElementById(`resPanelMsg${idx}`);

  if (!athlDocId || !eventId || round <= 1) {
    if (msgEl && msgEl.classList.contains('warn')) msgEl.style.display = 'none';
    syncSaveBtn(idx); return true;
  }

  const comp      = competitionsCache.find(c => c.id === compId);
  const evData    = comp && comp.events && comp.events[eventId];
  const totalRnds = evData ? (parseInt(evData.rounds) || 1) : round;
  const rNames    = getRoundNames(totalRnds);
  const roundName = rNames[round - 1] || `Round ${round}`;
  const prevName  = rNames[round - 2] || `Round ${round - 1}`;
  const eligStatus = athleteEligibilityStatus(compId, athlDocId, eventId, round);
  if (eligStatus !== 'ok') {
    if (msgEl) {
      msgEl.className   = 'msg warn';
      msgEl.textContent = eligStatus === 'not_qualified'
        ? `Cannot enter ${roundName} — athlete did not qualify from ${prevName}.`
        : `Cannot enter ${roundName} yet — ${prevName} result is missing.`;
      msgEl.style.display = 'block';
    }
    if (saveBtn) saveBtn.disabled = true;
    return false;
  }
  if (msgEl && msgEl.classList.contains('warn')) msgEl.style.display = 'none';
  syncSaveBtn(idx);
  return true;
}

function refreshPanelAthletesByEligibility(idx) {
  const compId  = document.getElementById('resComp').value;
  const eventId = document.getElementById(`p${idx}_event`).value;
  const round   = parseInt(document.getElementById(`p${idx}_round`).value) || 1;
  const sel     = document.getElementById(`p${idx}_athlete`);
  if (!sel) return;
  if (round <= 1 || !eventId) { checkPanelEligibility(idx); return; }
  const prevVal = sel.value;
  const comp    = compId ? competitionsCache.find(c => c.id === compId) : null;
  const athlIds = comp ? (comp.athleteIds || []) : [];
  const pool    = athletesCache.filter(a => athlIds.includes(a.id));
  sel.innerHTML = '<option value="">— Тамирчид —</option>';
  pool.forEach(a => {
    const eligible = athleteEligibleForRound(compId, a.id, eventId, round);
    const opt = document.createElement('option');
    opt.value = a.id;
    opt.textContent = a.name + (a.lastName ? ' ' + a.lastName : '') + (a.wcaId ? ` (${a.wcaId})` : '');
    opt.disabled = !eligible;
    if (!eligible) opt.style.color = 'var(--muted)';
    if (a.id === prevVal) opt.selected = true;
    sel.appendChild(opt);
  });
  sel.disabled = !pool.length;
  checkPanelEligibility(idx);
}

function copyPanelFrom(idx) {
  if (idx < 1) return;
  const prev    = idx - 1;
  const prevEv  = document.getElementById(`p${prev}_event`).value;
  const prevRd  = document.getElementById(`p${prev}_round`).value;
  const prevGrp = document.getElementById(`p${prev}_group`).value;

  const evSel = document.getElementById(`p${idx}_event`);

    evSel.value = prevEv;
    updatePanelRoundGroup(idx);

    if (grpSel.querySelector(`option[value="${prevGrp}"]`)) grpSel.value = prevGrp;
  }
}

function crSelectRound(rd) { crRound = rd; crGroup = null; crRenderTable(); }

function computeQualifiedSet(compId, evId, fromRound, results, comp) {
  const evData = comp && comp.events && comp.events[evId];
  const adv = evData && evData.advancement && evData.advancement[String(fromRound)];
  if (!adv || adv.type === 'none' || !adv.value) return null;
  const prev = results.filter(r =>
    r.competitionId === compId && r.eventId === evId && (r.round || 1) === fromRound
  );
  const ranked = prev.slice().sort((a, b) => {
    const aA = a.average, bA = b.average;
    if (aA === -1 && bA === -1) return (a.single||0)-(b.single||0);
    if (aA === -1) return 1; if (bA === -1) return -1;
    if (aA === null && bA === null) return (a.single||0)-(b.single||0);
    if (aA === null) return 1; if (bA === null) return -1;
    return aA - bA;
  });
  let cutoff;
  if (adv.type === 'count') cutoff = adv.value;
  else if (adv.type === 'percent') cutoff = Math.max(1, Math.floor(ranked.length * adv.value / 100));
  else return null;
  const ids = new Set(), names = new Set();
  ranked.slice(0, cutoff).forEach(r => {
    if (r.athleteId) ids.add(r.athleteId);
    if (r.athleteName) names.add(r.athleteName.trim().toLowerCase());
  });
  return { ids, names, cutoff, total: ranked.length };
}

function isQualifiedForRound(r, qualSet) {
  if (!qualSet) return true;
  if (r.athleteId && qualSet.ids.has(r.athleteId)) return true;
  if (r.athleteName && qualSet.names.has(r.athleteName.trim().toLowerCase())) return true;
  return false;
}

function computeAdvancingCutoff(comp, evId, round, totalRows) {
  if (!comp || !comp.events || !comp.events[evId]) return null;
  const evData = comp.events[evId];
  if (round >= (parseInt(evData.rounds) || 1)) return null;
  const adv = evData.advancement && evData.advancement[String(round)];
  if (!adv || adv.type === 'none' || !adv.value) return null;
  if (adv.type === 'count') return { cutoff: adv.value, text: `Top ${adv.value} advance to next round` };
  if (adv.type === 'percent') {
    const cut = Math.max(1, Math.floor(totalRows * adv.value / 100));
    return { cutoff: cut, text: `Top ${adv.value}% — ${cut} athlete${cut !== 1 ? 's' : ''} advance` };
  }
  return null;
}

function crRenderTable() {
  const wrap       = document.getElementById('compResultsWrap');
  const titleEl    = document.getElementById('crCompTitle');
  const metaEl     = document.getElementById('crCompMeta');
  const roundBar   = document.getElementById('crEventRoundBar');
  const roundTitle = document.getElementById('crEventRoundTitle');
  const roundTabs  = document.getElementById('crRoundTabs');
  if (!wrap) return;

  const comp     = competitionsCache.find(c => c.id === crCompId);
  const compName = comp ? comp.name : (crCompId || 'Competition');
  if (titleEl) titleEl.textContent = compName;
  if (metaEl && comp) {
    const pubs = allAdminResults.filter(r => r.competitionId === crCompId && r.status === 'published').length;
    const drafts = allAdminResults.filter(r => r.competitionId === crCompId && r.status !== 'published').length;
    metaEl.innerHTML = `${escHtml(comp.country || '')}${comp.date ? ' &bull; ' + escHtml(comp.date) : ''}
      &nbsp;<span class="badge-draft">${drafts} draft</span>
      &nbsp;<span class="badge-published">${pubs} published</span>`;
  }

  if (!crCompId || !crEvId) {
    if (roundBar) roundBar.style.display = 'none';
    wrap.innerHTML = '<div class="wca-empty">Select an event to view results.</div>';
    return;
  }

  const evResults = allAdminResults.filter(r => r.competitionId === crCompId && r.eventId === crEvId);
  const evDef = WCA_EVENTS.find(e => e.id === crEvId);
  const evName = (evResults[0] && evResults[0].eventName) || (evDef && evDef.name) || crEvId;

  const totalRounds = comp && comp.events && comp.events[crEvId]
    ? (parseInt(comp.events[crEvId].rounds) || 1) : null;
  const rounds = totalRounds
    ? Array.from({ length: totalRounds }, (_, i) => i + 1)
    : [...new Set(evResults.map(r => r.round || 1))].sort((a, b) => a - b);
  if (!rounds.includes(crRound)) crRound = rounds[0] || 1;

  const crRoundNames = getRoundNames(rounds.length);
  const roundLabel   = crRoundNames[crRound - 1] || `Round ${crRound}`;
  if (roundBar)   roundBar.style.display = 'flex';
  if (roundTitle) roundTitle.textContent = `${evName} — ${roundLabel}`;
  if (roundTabs) {
    roundTabs.innerHTML = rounds.map(rd => {
      const rName = crRoundNames[rd - 1] || `Round ${rd}`;
      return `<button class="wca-round-tab${rd === crRound ? ' active' : ''}" onclick="crSelectRound(${rd})">${escHtml(rName)}</button>`;
    }).join('');
  }

  const rdResults = evResults.filter(r => (r.round || 1) === crRound);
  if (!rdResults.length) {
    wrap.innerHTML = '<div class="wca-empty">No results for this round yet.</div>';
    return;
  }

  const ranked = [...rdResults].sort((a, b) => {
    const aA = a.average, bA = b.average;
    if (aA === -1 && bA === -1) return (a.single||0)-(b.single||0);
    if (aA === -1) return 1; if (bA === -1) return -1;
    if (aA === null && bA === null) return (a.single||0)-(b.single||0);
    if (aA === null) return 1; if (bA === null) return -1;
    return aA - bA;
  });

  const _advResult = computeAdvancingCutoff(comp, crEvId, crRound, ranked.length);
  const _advCutoff = _advResult ? _advResult.cutoff : null;
  const _qualSet   = crRound > 1 ? computeQualifiedSet(crCompId, crEvId, crRound - 1, allAdminResults, comp) : null;

  const tbodyRows = ranked.map((r, idx) => {
    const rank = idx + 1;
    const isImported = r.source === 'imported';
    const isAdv    = _advCutoff !== null && rank <= _advCutoff;
    const isNonQual = _qualSet !== null && !isQualifiedForRound(r, _qualSet);
    const podiumCls = rank === 1 ? ' row-gold' : rank === 2 ? ' row-silver' : rank === 3 ? ' row-bronze' : '';
    const sourceCls = isImported ? ' row-imported' : (podiumCls ? '' : ' row-club');
    const advCls    = isAdv ? ' row-advancing' : '';
    const nqCls     = isNonQual ? ' row-nonqualified' : '';
    const rowCls    = podiumCls + sourceCls + advCls + nqCls;
    const rankCls   = rank === 1 ? ' wca-rank-1' : rank === 2 ? ' wca-rank-2' : rank === 3 ? ' wca-rank-3' : '';

    const solves = (r.solves || [null,null,null,null,null]).slice(0, 5);
    while (solves.length < 5) solves.push(null);
    let bestVal = null, bestIdx = -1;
    solves.forEach((s, i) => {
      if (s !== null && s !== -1 && s !== -2) {
        if (bestVal === null || s < bestVal) { bestVal = s; bestIdx = i; }
      }
    });
    const solveCells = solves.map((s, i) => {
      const isBest = (i === bestIdx);
      const isDnf  = (s === -1 || s === -2);
      let cls = 'wca-td-solve';
      if (isBest) cls += ' best-solve';
      if (isDnf)  cls += ' dnf-solve';
      return `<td class="${cls}">${escHtml(fmtTime(s))}</td>`;
    }).join('');

    const avgCls = r.average === -1 ? ' dnf-avg' : '';
    const badge  = isImported
      ? `<span class="badge-imported">imported</span>`
      : r.status === 'published'
        ? `<span class="badge-published" style="font-size:0.65rem;">pub</span>`
        : `<span class="badge-draft" style="font-size:0.65rem;">draft</span>`;
    const nqBadge = isNonQual ? `<span class="badge-nonqual">&#9888; not qualified</span>` : '';

    return `<tr class="${rowCls} wca-fade-in">
      <td class="wca-td-rank${rankCls}">${rank}</td>
      <td class="wca-td-name">
        <div class="wca-name">${escHtml(r.athleteName||'—')}</div>
        ${r.country ? `<div class="wca-country">${escHtml(r.country)}</div>` : ''}
      </td>
      ${solveCells}
      <td class="wca-td-avg${avgCls}">${escHtml(fmtTime(r.average))}</td>
      <td class="wca-td-best">${escHtml(fmtTime(r.single))}</td>
      <td>${nqBadge || badge}</td>
    </tr>`;
  });

  if (_advCutoff !== null && _advCutoff > 0 && _advCutoff < tbodyRows.length) {
    tbodyRows.splice(_advCutoff, 0, `<tr class="adv-cutoff-row"><td colspan="9"></td></tr>`);
  }

  const advTextHtml = _advResult ? `<div class="adv-rule-text">&#10003; ${escHtml(_advResult.text)}</div>` : '';
  wrap.innerHTML = advTextHtml + `<table class="wca-results-table">
    <thead><tr>
      <th>#</th><th>Athlete</th>
      <th class="th-r">1</th><th class="th-r">2</th><th class="th-r">3</th><th class="th-r">4</th><th class="th-r">5</th>
      <th class="th-r">Average</th><th class="th-r">Best</th><th>Status</th>
    </tr></thead>
    <tbody>${tbodyRows.join('')}</tbody>
  </table>`;
}

// ================================================================
// INSPECTION TIMER
// ================================================================
(function() {
  var _inspInterval = null, _inspStart = 0, _inspElapsed = 0, _inspRunning = false;
  function _inspUpdate() { _inspElapsed = Math.round((Date.now() - _inspStart) / 10); _inspDraw(); }
  function _inspDraw() {
    var cs = _inspElapsed, sec = cs / 100;
    var timeEl = document.getElementById('inspTime');
    var statusEl = document.getElementById('inspStatus');
    if (!timeEl) return;
    timeEl.textContent = sec.toFixed(2);
    var cls = '', label = '';
    if (sec >= 17) {
      cls = 'dnf'; label = 'DNF';
      if (_inspRunning) {
        _inspRunning = false; clearInterval(_inspInterval); _inspInterval = null;
        var sb = document.getElementById('inspStartBtn'), tb = document.getElementById('inspStopBtn');
        if (sb) sb.disabled = false; if (tb) tb.disabled = true;
      }
    } else if (sec >= 15) { cls = 'plus2'; label = '+2 Penalty'; }
    else if (sec >= 12)   { cls = 'warn2'; label = 'Final Warning'; }
    else if (sec >= 8)    { cls = 'warn';  label = 'Warning'; }
    timeEl.className = 'insp-time' + (cls ? ' state-' + cls : '');
    statusEl.textContent = label;
    statusEl.className   = 'insp-status' + (cls ? ' visible ' + cls : '');
  }
  window.inspToggle = function() {
    var box = document.getElementById('inspBox'), btn = document.getElementById('inspToggleBtn');
    if (!box || !btn) return;
    var open = box.classList.toggle('visible');
    btn.classList.toggle('active', open);
  };
  window.inspStart = function() {
    if (_inspRunning) return;
    _inspRunning = true;
    _inspStart   = Date.now() - _inspElapsed * 10;
    _inspInterval = setInterval(_inspUpdate, 30);
    document.getElementById('inspStartBtn').disabled = true;
    document.getElementById('inspStopBtn').disabled  = false;
  };
  window.inspStop = function() {
    if (!_inspRunning) return;
    _inspRunning = false; clearInterval(_inspInterval); _inspInterval = null;
    document.getElementById('inspStartBtn').disabled = false;
    document.getElementById('inspStopBtn').disabled  = true;
  };
  window.inspClear = function() {
    window.inspStop(); _inspElapsed = 0; _inspDraw();
    document.getElementById('inspStartBtn').disabled = false;
    document.getElementById('inspStopBtn').disabled  = true;
  };
})();

async function loadDashboard() {
  try {
    var athleteDoc = await window.db.collection('athletes').doc(session.athleteId).get();
    if (!athleteDoc.exists) { showError('Athlete profile not found. Contact your admin.'); return; }
    var athlete = Object.assign({ id: athleteDoc.id }, athleteDoc.data());
    var resultsSnap = await window.db.collection('results')
      .where('athleteId', '==', session.athleteId)
      .where('status', '==', 'published')
      .get();
    var results = resultsSnap.docs
      .map(function(d) { return Object.assign({ id: d.id }, d.data()); })
      .filter(function(r) { return r.source !== 'imported'; });
    renderDashboard(athlete, results);
  } catch(e) { showError('Failed to load: ' + e.message); }
}

function renderDashboard(athlete, results) {
  var initials = (athlete.name || '?').split(' ').map(function(w){ return w[0]||''; }).join('').toUpperCase().slice(0,2);
  var fullName  = (athlete.lastName ? athlete.lastName + ' ' : '') + (athlete.name || '');

  var pbByEvent = {};
  results.forEach(function(r) {
    var eid = r.eventId;
    if (!pbByEvent[eid]) pbByEvent[eid] = { name: r.eventName || eid, single: null, average: null };
    if (r.single > 0 && (pbByEvent[eid].single === null || r.single < pbByEvent[eid].single))
      pbByEvent[eid].single = r.single;
    if (r.average && r.average > 0 && (pbByEvent[eid].average === null || r.average < pbByEvent[eid].average))
      pbByEvent[eid].average = r.average;
  });

  var compHistory = {};
  results.forEach(function(r) {
    var cid = r.competitionId || 'unknown';
    if (!compHistory[cid]) compHistory[cid] = { name: r.competitionName || r.competitionId || 'Unknown', results: [] };
    compHistory[cid].results.push(r);
  });

  var compsCount  = Object.keys(compHistory).length;
  var eventsCount = Object.keys(pbByEvent).length;
  var solvesCount = results.reduce(function(acc, r) {
    return acc + (r.solves || []).filter(function(s){ return s !== null && s > 0; }).length;
  }, 0);

  var avatarHtml = athlete.imageUrl
    ? '<div class="avatar"><img src="' + escHtml(athlete.imageUrl) + '" alt="' + escHtml(athlete.name) + '" onerror="this.parentElement.textContent=\'' + escHtml(initials) + '\'"></div>'
    : '<div class="avatar">' + escHtml(initials) + '</div>';

  var html = '';
  html += '<div class="profile-header">'
    + avatarHtml
    + '<div class="profile-info">'
    + '<div class="profile-name">' + escHtml(fullName) + '</div>'
    + '<div class="profile-meta">'
    + (athlete.wcaId ? '<div class="profile-meta-item">' + t('dash.meta.wca-id') + ' &nbsp;<b>' + escHtml(athlete.wcaId) + '</b></div>' : '')
    + '<div class="profile-meta-item">' + t('dash.meta.country') + ' &nbsp;<b>Mongolia</b></div>'
    + (athlete.birthDate ? '<div class="profile-meta-item">' + t('dash.meta.born') + ' &nbsp;<b>' + escHtml(athlete.birthDate) + '</b></div>' : '')
    + '</div></div></div>';

  html += '<div class="stats-bar">'
    + '<div class="stat-item"><div class="stat-val">' + compsCount  + '</div><div class="stat-label">' + t('dash.stat.competitions') + '</div></div>'
    + '<div class="stat-item"><div class="stat-val">' + eventsCount + '</div><div class="stat-label">' + t('dash.stat.events') + '</div></div>'
    + '<div class="stat-item"><div class="stat-val">' + solvesCount + '</div><div class="stat-label">' + t('dash.stat.solves') + '</div></div>'
    + '</div>';

  if (eventsCount) {
    var evOrder = WCA_EVENTS.map(function(e){ return e.id; });
    var sortedEvIds = Object.keys(pbByEvent).sort(function(a, b) {
      var ai = evOrder.indexOf(a); var bi = evOrder.indexOf(b);
      return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
    });
    html += '<div class="section-title">' + t('dash.personal-records') + '</div>';
    html += '<div class="table-wrap"><table><thead><tr>'
      + '<th>' + t('dash.col.event') + '</th><th>' + t('dash.col.single') + '</th><th>' + t('dash.col.average') + '</th>'
      + '</tr></thead><tbody>';
    sortedEvIds.forEach(function(eid) {
      var pb = pbByEvent[eid];
      html += '<tr>'
        + '<td>' + escHtml(pb.name) + '</td>'
        + '<td><span class="' + (pb.single === -1 ? 'time-dnf' : 'time-val') + '">' + (pb.single !== null ? fmtTime(pb.single) : '—') + '</span></td>'
        + '<td><span class="' + (pb.average === -1 ? 'time-dnf' : 'time-val') + '">' + (pb.average !== null ? fmtTime(pb.average) : '—') + '</span></td>'
        + '</tr>';
    });
    html += '</tbody></table></div>';
  }

  if (compsCount) {
    html += '<div class="section-title">' + t('dash.comp-history') + '</div>';
    var evOrder2 = WCA_EVENTS.map(function(e){ return e.id; });
    Object.values(compHistory).forEach(function(comp) {
      var sortedRows = comp.results.slice().sort(function(a, b) {
        var ai = evOrder2.indexOf(a.eventId); var bi = evOrder2.indexOf(b.eventId);
        var evDiff = (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
        return evDiff !== 0 ? evDiff : (a.round || 1) - (b.round || 1);
      });
      html += '<div class="comp-block">'
        + '<div class="comp-block-title">' + escHtml(comp.name) + '</div>'
        + '<div class="table-wrap"><table><thead><tr>'
        + '<th>' + t('dash.col.event') + '</th><th>' + t('dash.col.round') + '</th><th>' + t('dash.col.group') + '</th>'
        + '<th>S1</th><th>S2</th><th>S3</th><th>S4</th><th>S5</th>'
        + '<th>' + t('dash.col.single') + '</th><th>' + t('dash.col.average') + '</th>'
        + '</tr></thead><tbody>';
      sortedRows.forEach(function(r) {
        var solves = r.solves || [null,null,null,null,null];
        html += '<tr>'
          + '<td style="white-space:nowrap">' + escHtml(r.eventName || r.eventId || '') + '</td>'
          + '<td class="muted">' + escHtml(String(r.round || 1)) + '</td>'
          + '<td class="muted">' + escHtml(r.group || '') + '</td>'
          + solves.slice(0,5).map(function(s){ return '<td class="muted">' + fmtTime(s) + '</td>'; }).join('')
          + '<td><span class="time-val">' + fmtTime(r.single) + '</span></td>'
          + '<td><span class="' + (r.average === -1 ? 'time-dnf' : 'time-val') + '">' + fmtTime(r.average) + '</span></td>'
          + '</tr>';
      });
      html += '</tbody></table></div></div>';
    });
  }

  if (!eventsCount && !compsCount) {
    html += '<div class="empty"><div class="empty-icon">&#128202;</div>' + t('dash.no-results') + '</div>';
  }

  document.getElementById('pageContent').className = '';
  document.getElementById('pageContent').innerHTML = html;
}

var _asgData      = null;
var _asgActiveEid = null;

function asgPopulateCompSel() {
  var sel = document.getElementById('asgCompSel');
  if (!sel) return;
  var prev = sel.value;
  sel.innerHTML = '<option value="">— Select Competition —</option>';
  var order = { live: 0, upcoming: 1 };
  var sorted = competitionsCache.filter(function(c) {
    return c.status === 'live' || c.status === 'upcoming';
  }).sort(function(a, b) {
    return (order[a.status] || 2) - (order[b.status] || 2);
  });
  sorted.forEach(function(c) {
    var opt = document.createElement('option');
    opt.value = c.id;
    opt.textContent = c.name + (c.status ? ' (' + c.status + ')' : '');
    if (c.id === prev) opt.selected = true;
    sel.appendChild(opt);
  });
}

async function asgLoadComp(compId) {
  var body     = document.getElementById('asgBody');
  var tabsEl   = document.getElementById('asgEventTabs');
  _asgData      = null;
  _asgActiveEid = null;
  if (tabsEl) { tabsEl.innerHTML = ''; tabsEl.style.display = 'none'; }
  if (!compId) {
    body.innerHTML = '<div class="cao-empty-state">Select a competition to view assignments.</div>';
    return;
  }
  body.innerHTML = '<div class="cao-empty-state">Loading…</div>';
  try {
    var snap = await window.db.collection('assignments').doc(compId).get();
    if (!snap.exists || !snap.data() || !snap.data().byEvent) {
      body.innerHTML = '<div class="cao-empty-state">No assignments published yet.<br>' +
        '<span style="font-size:0.78rem;opacity:0.6;">The admin must generate and save assignments first.</span></div>';
      return;
    }
    _asgData = snap.data();
    var eids = Object.keys(_asgData.byEvent);
    _asgActiveEid = eids[0] || null;
    if (tabsEl) {
      tabsEl.style.display = eids.length > 1 ? 'flex' : 'none';
      tabsEl.innerHTML = eids.map(function(eid) {
        var evMeta = WCA_EVENTS.find(function(e) { return e.id === eid; });
        var label  = evMeta ? evMeta.short : eid;
        var active = eid === _asgActiveEid ? ' active' : '';
        return '<button class="cao-ev-pill' + active + '" onclick="asgSelectEvent(\'' + escHtml(eid) + '\')">' + escHtml(label) + '</button>';
      }).join('');
    }
    asgRenderEvent(_asgActiveEid);
  } catch(e) {
    body.innerHTML = '<div class="cao-empty-state">Failed to load assignments: ' + escHtml(e.message) + '</div>';
  }
}

function asgSelectEvent(eid) {
  if (!_asgData || !_asgData.byEvent[eid]) return;
  _asgActiveEid = eid;
  document.querySelectorAll('#asgEventTabs .cao-ev-pill').forEach(function(btn) {
    var evMeta = WCA_EVENTS.find(function(e) { return e.id === eid; });
    var label  = evMeta ? evMeta.short : eid;
    btn.classList.toggle('active', btn.textContent.trim() === label);
  });
  asgRenderEvent(eid);
}

function asgRenderEvent(eid) {
  var body = document.getElementById('asgBody');
  if (!_asgData || !_asgData.byEvent || !_asgData.byEvent[eid]) {
    body.innerHTML = '<div class="cao-empty-state">No assignments for this event.</div>';
    return;
  }
  var evData = _asgData.byEvent[eid];
  var rdNums = Object.keys(evData.rounds || {}).map(Number).sort(function(a, b) { return a - b; });
  if (!rdNums.length) {
    body.innerHTML = '<div class="cao-empty-state">No rounds found.</div>';
    return;
  }

  var athleteMap = {}, dutyMap = {};
  function trackRole(arr, role) {
    (arr || []).forEach(function(a) {
      athleteMap[a.id] = a.name || a.id;
      if (!dutyMap[a.id]) dutyMap[a.id] = { name: a.name || a.id, comp: 0, judge: 0, scramble: 0, standby: 0 };
      dutyMap[a.id][role]++;
    });
  }
  rdNums.forEach(function(rd) {
    (evData.rounds[rd].heats || []).forEach(function(h) {
      trackRole(h.competitors, 'comp');
      trackRole(h.judges,      'judge');
      trackRole(h.scramblers,  'scramble');
      trackRole(h.standby,     'standby');
    });
  });
  var totalHeats    = rdNums.reduce(function(s, rd) { return s + (evData.rounds[rd].heats || []).length; }, 0);
  var totalAthletes = Object.keys(athleteMap).length;

  var summaryHtml = '<div class="cao-summary-bar">' +
    '<span class="cao-sum-chip">' + rdNums.length + ' round' + (rdNums.length !== 1 ? 's' : '') + '</span>' +
    '<span class="cao-sum-chip">' + totalHeats + ' heat' + (totalHeats !== 1 ? 's' : '') + '</span>' +
    '<span class="cao-sum-chip">' + totalAthletes + ' athlete' + (totalAthletes !== 1 ? 's' : '') + '</span>' +
    '</div>';

  var roundTypeBadge = { r1: 'All athletes', r2: 'Qualified compete', final: 'Finalists only' };

  function nameList(arr) {
    if (!arr || !arr.length) return '<span class="cao-empty-tag">—</span>';
    return '<div class="cao-name-list">' + arr.map(function(a) {
      return '<span class="cao-name-tag">' + escHtml(a.name || a.id) + '</span>';
    }).join('') + '</div>';
  }

  function renderHeat(h) {
    var quality      = h.overlap ? 'reduced' : h.full ? 'ok' : 'warn';
    var qualityLabel = h.overlap ? 'Role overlap' : h.full ? 'Full coverage' : 'Partial';
    var html = '<div class="cao-heat-card">';
    html += '<div class="cao-heat-header">';
    html += '<span class="cao-heat-label">' + escHtml(h.label) + '</span>';
    html += '<span class="cao-quality-badge cao-quality-' + quality + '">' + escHtml(qualityLabel) + '</span>';
    html += '</div><div class="cao-heat-body">';
    html += '<div class="cao-role-group cao-role-competitor"><div class="cao-role-title">Competitors</div>' + nameList(h.competitors) + '</div>';
    html += '<div class="cao-role-group cao-role-judge"><div class="cao-role-title">Judges</div>'          + nameList(h.judges)      + '</div>';
    html += '<div class="cao-role-group cao-role-scrambler"><div class="cao-role-title">Scramblers</div>'  + nameList(h.scramblers)  + '</div>';
    if (h.standby && h.standby.length) {
      html += '<div class="cao-role-group cao-role-standby"><div class="cao-role-title">Standby</div>'    + nameList(h.standby)     + '</div>';
    }
    html += '</div></div>';
    return html;
  }

  var roundsHtml = rdNums.map(function(rd) {
    var rnd   = evData.rounds[rd];
    var heats = rnd.heats || [];
    var typeBadge = roundTypeBadge[rnd.roundType] || '';
    var html  = '<div class="cao-round-section">';
    html += '<div class="cao-round-header">';
    html += '<span class="cao-round-label">' + escHtml(rnd.roundName || ('Round ' + rd)) + '</span>';
    if (typeBadge) html += '<span class="cao-round-type-badge">' + escHtml(typeBadge) + '</span>';
    html += '<span class="cao-round-badge">' + heats.length + ' heat' + (heats.length !== 1 ? 's' : '') + '</span>';
    html += '</div>';
    html += '<div class="cao-heats">' + heats.map(renderHeat).join('') + '</div>';
    html += '</div>';
    return html;
  }).join('');

  var dutyAthletes = Object.keys(dutyMap).map(function(id) { return dutyMap[id]; });
  var dutyHtml = '';
  if (dutyAthletes.length) {
    dutyHtml = '<details class="cao-duty-details"><summary class="cao-duty-summary">&#9656; Duty Totals</summary>' +
      '<div style="overflow-x:auto;"><table class="cao-duty-table"><thead><tr>' +
      '<th>Athlete</th><th class="th-r">Competed</th><th class="th-r">Judged</th><th class="th-r">Scrambled</th><th class="th-r">Standby</th>' +
      '</tr></thead><tbody>' +
      dutyAthletes.map(function(d) {
        return '<tr><td>' + escHtml(d.name) + '</td>' +
          '<td class="td-r">' + d.comp + '</td>' +
          '<td class="td-r">' + d.judge + '</td>' +
          '<td class="td-r">' + d.scramble + '</td>' +
          '<td class="td-r">' + d.standby + '</td></tr>';
      }).join('') +
      '</tbody></table></div></details>';
  }

  body.innerHTML = summaryHtml + roundsHtml + dutyHtml;
}

// Wire up assignments competition selector after DOM ready
document.addEventListener('DOMContentLoaded', function() {
  var sel = document.getElementById('asgCompSel');
  if (sel) sel.addEventListener('change', function() { asgLoadComp(this.value); });
});

// THEME

(function() {
  var THEMES = ['dark', 'soft-light', 'purple-light'];
  var LABELS  = { dark: '🌑 Dark', 'soft-light': '☀ Light', 'purple-light': '💜 Purple' };
  window.cycleTheme = function() {
    var cur  = document.documentElement.getAttribute('data-theme') || 'dark';
    var next = THEMES[(THEMES.indexOf(cur) + 1) % THEMES.length];
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('cubeTheme', next);
    document.querySelectorAll('.theme-btn').forEach(function(b) { b.textContent = LABELS[next]; });
  };
  var saved = localStorage.getItem('cubeTheme') || 'dark';
  document.querySelectorAll('.theme-btn').forEach(function(b) { b.textContent = LABELS[saved] || '🌑 Dark'; });

  // Nav dropdown toggle
  window.toggleNavMenu = function() {
    var wrap = document.getElementById('navMenuWrap');
    if (wrap) wrap.classList.toggle('open');
  };
  document.addEventListener('click', function(e) {
    var wrap = document.getElementById('navMenuWrap');
    if (wrap && wrap.classList.contains('open') && !wrap.contains(e.target)) {
      wrap.classList.remove('open');
    }
  });
})();
